<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Equinox</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background-color: #f9fafb;
    }
  </style>
</head>

<body class="font-sans text-gray-800">

<div class="flex min-h-screen">

  <!-- Sidebar -->
  <aside class="w-64 bg-white border-r p-6">
    <h1 class="text-2xl font-bold text-blue-500 mb-8">Equinox</h1>

    <nav class="flex flex-col gap-4">
      <a href="#" class="font-medium text-blue-500">Dashboard</a>
      <a href="/public/ye-calendar.html" class="text-gray-600 hover:text-blue-500">Calendar</a>
      <a href="/public/ye-notes.html" class="text-gray-600 hover:text-blue-500">Notes</a>
      <a href="/public/Settings.html" class="text-gray-600 hover:text-blue-500">Settings</a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 p-8">

    <!-- Header -->
    <div class="mb-8">
      <h2 class="text-3xl font-bold">
        Welcome, <span id="dashboard-user-name"></span> 👋
      </h2>
      <p class="text-gray-500">Here’s your productivity overview</p>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">

      <div class="bg-white p-5 rounded-2xl shadow-sm border">
        <p class="text-sm text-gray-500">Tasks Today</p>
        <p id="stat-task-day" class="text-3xl font-bold mt-2">0</p>
      </div>

      <div class="bg-white p-5 rounded-2xl shadow-sm border">
        <p class="text-sm text-gray-500">This Week</p>
        <p id="stat-task-week" class="text-3xl font-bold mt-2">0</p>
      </div>

      <div class="bg-white p-5 rounded-2xl shadow-sm border">
        <p class="text-sm text-gray-500">This Month</p>
        <p id="stat-task-month" class="text-3xl font-bold mt-2">0</p>
      </div>

      <div class="bg-white p-5 rounded-2xl shadow-sm border">
        <p class="text-sm text-gray-500">To Review</p>
        <p id="stat-review" class="text-3xl font-bold mt-2">0</p>
      </div>

    </div>

    <!-- Tasks Section -->
    <div class="bg-white p-6 rounded-2xl shadow-sm border mb-8">
      <h3 class="text-lg font-semibold mb-4">Your Tasks</h3>

      <form id="task-form" class="flex gap-2 mb-4">
        <div>
          <label for="task-input" class="block text-sm font-medium text-gray-600 mb-1">
            Task Name
          </label>
          <input
                  id="task-input"
                  type="text"
                  placeholder="Enter task..."
                  class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
          />
        </div>

        <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600">
          Add
        </button>
      </form>

      <ul id="task-list" class="space-y-2"></ul>

      <div class="flex gap-2 mt-4">
        <button id="remove-task-btn" class="bg-gray-200 px-3 py-2 rounded-lg">Remove</button>
        <button id="task-complete" class="bg-green-500 text-white px-3 py-2 rounded-lg">Complete</button>
      </div>
    </div>

    <!-- Memory Check -->
    <div class="bg-white p-6 rounded-2xl shadow-sm border mb-8">
      <h3 class="text-lg font-semibold mb-4">Memory Check</h3>

      <div id="noNoteMessage" class="text-gray-400 text-sm hidden">
        No notes yet. <a href="/public/ye-notes.html" class="text-blue-500">Create one</a>.
      </div>

      <h4 id="recallTitle" class="font-bold mb-3"></h4>

      <button id="revealNoteBtn" class="bg-purple-500 text-white px-4 py-2 rounded-lg mb-3">
        Reveal Notes
      </button>

      <div id="recallContainer" class="hidden">
        <div id="recallBody" class="bg-gray-50 p-3 rounded mb-3 text-sm"></div>

        <div class="flex gap-2">
          <button class="confidence-btn bg-red-100 px-3 py-2 rounded" data-rating="low">Hard</button>
          <button class="confidence-btn bg-yellow-100 px-3 py-2 rounded" data-rating="medium">Good</button>
          <button class="confidence-btn bg-green-100 px-3 py-2 rounded" data-rating="high">Easy</button>
        </div>
      </div>

      <h3 class="text-lg font-semibold mb-4">Reminders</h3>

      <form id="reminder-form" class="flex flex-col gap-3 mb-4">
        <div>
          <label for="reminder-title" class="block text-sm font-medium text-gray-600 mb-1">
            Reminder Title
          </label>
          <input
                  type="text"
                  id="reminder-title"
                  placeholder="What’s the reminder?"
                  class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
          />
        </div>
        <div>
          <label for="reminder-time" class="block text-sm font-medium text-gray-600 mb-1">
            Date & Time
          </label>
          <input
                  type="datetime-local"
                  id="reminder-time"
                  class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
          />
        </div>

        <button class="bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600">
          Add Reminder
        </button>
      </form>

      <ul id="reminder-list" class="space-y-2"></ul>
    </div>


  </main>
</div>

<!-- Scripts -->
<script type="module" src="/Scripts/Tasks/AddTasks.ts"></script>
<script type="module" src="/Scripts/Tasks/DeleteTasks.ts"></script>
<script type="module" src="/Scripts/Reminders/AddReminder.ts"></script>
<script type="module" src="/Scripts/Reminders/DeleteReminder.ts"></script>
<script type="module" src="/Scripts/Calendar/MainCalendar.ts"></script>
<script type="module" src="/Scripts/ActiveLearningTools/Dashboard/Stats.ts"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.cdnfonts.com chrome-extension:; connect-src 'self' https://*.supabase.co;">
  <title>Your Equinox - Pro Editor</title>
  <link rel="stylesheet" href="/CSS/theme.css">
  <link rel="stylesheet" href="/CSS/math.css">
  <link rel="stylesheet" href="/CSS/Accessibilitybar.css">
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
</head>
<body class="h-screen flex overflow-hidden">
<aside class="w-64 glass-panel flex flex-col h-full shrink-0 z-20 shadow-xl">
  <div class="p-5 border-b border-gray-200 flex justify-between items-center">
    <a href="/YeDashBoard.html" class="text-sm font-bold text-slate-500 hover:text-indigo-500 transition-colors flex items-center gap-2">&larr; Dashboard</a>
  </div>
  <div id="sidebar-note-list" class="flex-1 overflow-y-auto p-4 space-y-2"></div>
</aside>
<main class="flex-1 flex flex-col overflow-y-auto relative bg-transparent">
  <div id="editor-container" class="max-w-4xl w-full mx-auto p-8 hidden flex-col min-h-full">
    <input type="text" id="note-title" class="text-5xl font-black w-full outline-none mb-8 bg-transparent" placeholder="Untitled">
    <div id="tiptap-editor" class="w-full flex-1 prose prose-slate prose-lg max-w-none pb-24"></div>
  </div>
</main>
<script type="module" src="../Scripts/NoteTaking/Accessibilitybar.ts"></script>
<script type="module" src="../Scripts/Supabase/AuthGuard.ts"></script>
<script type="module" src="../Scripts/NoteTaking/NotePage.ts"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YE - Calendar</title>

    <link rel="stylesheet" href="/CSS/theme.css">
    <link rel="stylesheet" href="/CSS/calendar.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/dayjs.min.js"></script>
</head>
<body class="antialiased min-h-screen pt-24 selection:bg-pink-500 selection:text-white">

<nav class="fixed top-6 left-1/2 transform -translate-x-1/2 z-50 px-3 py-2 bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl border border-white/40 dark:border-slate-700 rounded-full shadow-2xl flex items-center gap-2">
    <a href="../index.html" class="px-5 py-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 font-bold text-sm transition-all text-slate-600 dark:text-slate-300">Home</a>
    <a href="/pages/ye-notes.html" class="px-5 py-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 font-bold text-sm transition-all text-slate-600 dark:text-slate-300">Notes</a>
    <a href="#" class="px-5 py-2 rounded-full bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold text-sm shadow-md">Calendar</a>
</nav>

<div id="app" class="min-h-screen p-4 md:p-8 flex flex-col items-center max-w-[1600px] mx-auto"></div>

<div id="drag-proxy" class="fixed pointer-events-none z-[9999] opacity-90"></div>

<dialog id="calendar-reminder-modal" class="p-8 rounded-3xl min-w-[320px] max-w-sm w-full m-auto backdrop:bg-slate-900/40">
    <h2 class="text-2xl font-black mb-6 dark:text-white">Add Reminder</h2>
    <form id="calendar-reminder-form" class="flex flex-col gap-5">
        <input type="text" id="cal-reminder-title" placeholder="Event details..." class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none font-medium text-sm" required />
        <input type="datetime-local" id="cal-reminder-time" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none font-medium text-sm" required />

        <div class="flex items-center justify-between p-3 border border-slate-200 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-800/50">
            <label for="cal-reminder-color" class="text-slate-600 dark:text-slate-400 font-bold text-sm">Event Color:</label>
            <input type="color" id="cal-reminder-color" class="border-0 p-0 rounded-lg cursor-pointer h-8 w-10 bg-transparent" value="#3b82f6" />
        </div>

        <div class="flex justify-end gap-3 mt-4">
            <button type="button" id="cal-close-modal" class="px-5 py-3 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-bold rounded-xl transition">Cancel</button>
            <button type="submit" class="px-6 py-3 bg-gradient-to-r from-indigo-500 to-purple-500 text-white font-black rounded-xl hover:shadow-lg transition">Save</button>
        </div>
    </form>
</dialog>

<script type="module" src="/Scripts/Supabase/AuthGuard.ts"></script>
<script type="module" src="/Scripts/Calendar/MainCalendar.ts"></script>
<script type="module" src="Scripts/Settings/Theme.ts"></script>

</body>
</html>

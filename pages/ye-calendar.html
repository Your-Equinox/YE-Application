<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Your Equinox - Calendar</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="/CSS/calendar.css">
</head>

<body class="bg-gray-50 font-sans text-gray-800">

<div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r p-6">
        <h1 class="text-2xl font-bold text-blue-500 mb-8">Equinox</h1>

        <nav class="flex flex-col gap-4">
            <a href="/index.html" class="text-gray-600 hover:text-blue-500">Dashboard</a>
            <a href="#" class="text-blue-500 font-medium">Calendar</a>
            <a href="/public/ye-notes.html" class="text-gray-600 hover:text-blue-500">Notes</a>
            <a href="/public/Settings.html" class="text-gray-600 hover:text-blue-500">Settings</a>
        </nav>
    </aside>

    <!-- Main -->
    <main class="flex-1 p-8">

        <!-- Header -->
        <div class="mb-6">
            <h2 class="text-3xl font-bold">Calendar</h2>
            <p class="text-gray-500">Manage your schedule and reminders</p>
        </div>

        <!-- Calendar Container -->
        <div class="bg-white rounded-2xl shadow-sm border p-4">

            <!-- Calendar will render here -->
            <div id="app" class="w-full"></div>

        </div>

    </main>
</div>

<!-- Drag Proxy -->
<div id="drag-proxy"></div>

<!-- Modal -->
<dialog id="calendar-reminder-modal" class="rounded-2xl border-none shadow-2xl p-0 backdrop:bg-black/40">

    <div class="p-6 w-[350px]">

        <h2 class="text-xl font-bold mb-4">Add Reminder</h2>

        <form id="calendar-reminder-form" class="flex flex-col gap-4">
            <div>
                <label for="event-title" class="block text-sm font-medium text-gray-600 mb-1">
                    Event Title
                </label>
                <input
                        id="event-title"
                        type="text"
                        placeholder="Enter event..."
                        class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                />
            </div>


            <div>
                <label for="event-datetime" class="block text-sm font-medium text-gray-600 mb-1">
                    Date & Time
                </label>
                <input
                        id="event-datetime"
                        type="datetime-local"
                        class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                />
            </div>

            <div class="flex items-center justify-between">
                <label class="text-sm text-gray-600">Color</label>
                <div>
                    <label for="event-color" class="block text-sm font-medium text-gray-600 mb-1">
                        Event Color
                    </label>
                    <input
                            id="event-color"
                            type="color"
                            class="w-16 h-10 p-1 border rounded-lg cursor-pointer"
                    />
                </div>
            </div>

            <div class="flex justify-end gap-2 mt-2">
                <button
                        type="button"
                        id="cal-close-modal"
                        class="px-4 py-2 rounded-lg bg-gray-100 hover:bg-gray-200"
                >
                    Cancel
                </button>

                <button
                        type="submit"
                        class="px-4 py-2 rounded-lg bg-blue-500 text-white hover:bg-blue-600"
                >
                    Save
                </button>
            </div>

        </form>

    </div>
</dialog>
<script type="module" src="/Scripts/Supabase/AuthGuard.ts"></script>
<script type="module" src="/Scripts/Calendar/MainCalendar.ts"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YE - Practice Quiz</title>

  <link rel="stylesheet" href="/CSS/theme.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark-mode');
  </script>
</head>
<body class="h-screen flex flex-col antialiased selection:bg-pink-500 selection:text-white">

<header class="p-5 flex justify-between items-center sticky top-0 z-50 shadow-sm">
  <a href="/pages/ye-notes.html" class="px-5 py-2 rounded-full bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-bold text-sm transition-colors">
    &larr; Exit
  </a>
  <h1 id="quiz-title" class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-purple-500">Loading Sequence...</h1>
  <div class="w-24"></div>
</header>

<main class="flex-1 overflow-y-auto p-6 md:p-12 flex flex-col items-center">

  <div id="no-quiz-msg" class="hidden text-center mt-20 quiz-card w-full max-w-md">
    <div class="text-6xl mb-4">🤷</div>
    <p class="text-xl font-bold mb-4">No quiz found for this note.</p>
    <a href="/pages/ye-notes.html" class="text-indigo-500 hover:text-indigo-600 font-bold underline transition-colors">Return to notes</a>
  </div>

  <div id="quiz-container" class="w-full max-w-3xl space-y-8"></div>

  <div class="mt-16 mb-12">
    <button id="finish-quiz-btn" class="hidden px-10 py-4 bg-gradient-to-r from-emerald-400 to-emerald-600 text-white font-black text-lg rounded-2xl shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all">
      Submit Evaluation
    </button>
  </div>

</main>

<script type="module" src="/Scripts/Supabase/AuthGuard.ts"></script>
<script type="module" src="/Scripts/ActiveLearningTools/LearningTools/Quizzes.ts"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data: chrome-extension:; connect-src 'self' https://*.supabase.co;">
  <title>Settings - Your Equinox</title>
  <link rel="stylesheet" href="/CSS/theme.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen flex overflow-hidden selection:bg-pink-500 selection:text-white">
<aside class="w-72 glass-panel border-r border-y-0 border-l-0 flex flex-col z-10">
  <div class="p-8 border-b border-gray-200 dark:border-slate-700">
    <h1 class="text-3xl font-black bg-gradient-to-r from-indigo-500 to-purple-500 text-transparent bg-clip-text tracking-tight">Settings</h1>
  </div>
  <nav class="flex-1 p-6 space-y-3">
    <button class="w-full text-left px-5 py-3 rounded-xl bg-slate-900 text-white dark:bg-white dark:text-slate-900 font-bold transition-all shadow-md hover:scale-[1.02]">👤 General</button>
    <button class="w-full text-left px-5 py-3 rounded-xl text-slate-600 dark:text-slate-400 font-bold transition-all hover:bg-slate-100 dark:hover:bg-slate-800">🔔 Notifications</button>
    <button class="w-full text-left px-5 py-3 rounded-xl text-slate-600 dark:text-slate-400 font-bold transition-all hover:bg-slate-100 dark:hover:bg-slate-800">✨ AI Assistant</button>
    <button class="w-full text-left px-5 py-3 rounded-xl text-slate-600 dark:text-slate-400 font-bold transition-all hover:bg-slate-100 dark:hover:bg-slate-800">🛡️ Privacy</button>
  </nav>
  <div class="p-6 border-t border-gray-200 dark:border-slate-700 space-y-3">
    <a href="/YeDashBoard.html" class="block w-full text-center px-5 py-3 border-2 border-slate-200 dark:border-slate-700 rounded-xl text-slate-700 dark:text-slate-300 font-bold hover:bg-slate-50 dark:hover:bg-slate-800 transition">&larr; Dashboard</a>
    <button id="logout-btn" class="block w-full text-center px-5 py-3 bg-red-50 dark:bg-red-500/10 border-2 border-red-100 dark:border-red-900/50 rounded-xl text-red-600 dark:text-red-400 hover:bg-red-100 dark:hover:bg-red-500/20 transition font-bold">Sign Out</button>
  </div>
</aside>
<main class="flex-1 overflow-y-auto p-8 md:p-12 relative z-0">
  <div class="max-w-3xl mx-auto space-y-8">
    <section id="general" class="glass-panel rounded-3xl p-8">
      <div class="flex justify-between items-center mb-6 border-b border-gray-200 dark:border-slate-700 pb-4">
        <h2 class="text-2xl font-black">General Account</h2>
        <button id="theme-toggle-btn" class="p-2 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:scale-110 transition-transform"><svg id="sun-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
      </div>
      <div class="space-y-6">
        <div>
          <label class="block text-sm font-bold text-slate-500 uppercase tracking-widest mb-2" for="display-name">Display Name</label>
          <div class="flex flex-col sm:flex-row gap-3">
            <input type="text" id="display-name" class="flare-input flex-1 px-5 py-3 rounded-xl font-medium">
            <button id="save-name-btn" class="bg-gradient-to-r from-indigo-500 to-purple-500 text-white px-8 py-3 rounded-xl font-bold shadow-lg">Save</button>
          </div>
        </div>
      </div>
    </section>
  </div>
</main>
<script type="module" src="../Scripts/Supabase/AuthGuard.ts"></script>
<script type="module" src="../Scripts/Settings/SettingsPage.ts"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Equinox – Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex items-center justify-center p-4">

<div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md">

    <!-- Logo -->
    <div class="flex items-center gap-3 mb-6 justify-center">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="16" stroke="#3b82f6" stroke-width="2" fill="none"/>
            <line x1="8" y1="8" x2="12" y2="12" stroke="#3b82f6" stroke-width="2"/>
            <line x1="4" y1="20" x2="8" y2="20" stroke="#3b82f6" stroke-width="2"/>
            <line x1="8" y1="32" x2="12" y2="28" stroke="#3b82f6" stroke-width="2"/>
            <path d="M28 20 C28 25, 24 30, 20 30 C24 28, 24 22, 20 20 C24 18, 24 12, 20 10 C24 12, 28 15, 28 20" fill="#3b82f6" opacity="0.3"/>
            <path d="M16 14 L24 14 M16 20 L24 20 M16 26 L22 26" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
        </svg>
        <span class="text-2xl font-bold text-blue-500">Your Equinox</span>
    </div>

    <!-- Tab Toggle -->
    <div class="flex rounded-lg bg-gray-100 p-1 mb-6">
        <button id="login-tab" class="flex-1 py-2 text-sm font-medium rounded-md bg-white text-blue-600 shadow transition">
            Sign In
        </button>
        <button id="signup-tab" class="flex-1 py-2 text-sm font-medium rounded-md text-gray-500 transition hover:text-gray-700">
            Create Account
        </button>
    </div>

    <!-- Error Message -->
    <div id="auth-error" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg"></div>

    <!-- Success Message -->
    <div id="auth-success" class="hidden mb-4 p-3 bg-green-50 border border-green-200 text-green-600 text-sm rounded-lg"></div>

    <!-- Login Form -->
    <form id="login-form" class="flex flex-col gap-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input id="login-email" type="email" required placeholder="you@example.com"
                   class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input id="login-password" type="password" required placeholder="••••••••"
                   class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <button type="submit" id="login-btn"
                class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2.5 rounded-lg transition">
            Sign In
        </button>
    </form>

    <!-- Signup Form (hidden by default) -->
    <form id="signup-form" class="hidden flex-col gap-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Display Name</label>
            <input id="signup-name" type="text" required placeholder="What should we call you?"
                   class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input id="signup-email" type="email" required placeholder="you@example.com"
                   class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input id="signup-password" type="password" required placeholder="At least 6 characters"
                   class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <button type="submit" id="signup-btn"
                class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2.5 rounded-lg transition">
            Create Account
        </button>
    </form>

</div>
<script type="module" src="Scripts/Supabase/Auth.ts"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Equinox </title>

  <link rel="stylesheet" href="/YE-Application/Styles/modal.css">
  <link rel="stylesheet" href="/YE-Application/CSS/calendar.css">
  <link rel="stylesheet" href="/YE-Application/CSS/theme.css">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/dayjs.min.js"></script>
</head>

<body class="antialiased min-h-screen flex flex-col items-center pb-20 selection:bg-pink-500 selection:text-white">

<nav class="fixed top-6 z-50 px-3 py-2 bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl border border-white/40 dark:border-slate-700 rounded-full shadow-2xl shadow-indigo-500/10 flex items-center gap-2">
  <div class="flex items-center gap-2 pl-3 pr-4 border-r border-slate-300 dark:border-slate-700">
    <div class="w-6 h-6 rounded-full bg-gradient-to-tr from-amber-400 via-pink-500 to-blue-500 animate-spin-slow" style="animation: spin 8s linear infinite;"></div>
    <span class="font-bold tracking-widest uppercase text-sm">Equinox</span>
  </div>
  <a href="#" class="px-5 py-2 rounded-full bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold text-sm shadow-md transition-transform hover:scale-105">Home</a>
  <a href="/YE-Application/pages/ye-notes.html" class="px-5 py-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 font-semibold text-sm transition-all text-slate-600 dark:text-slate-300">Notes</a>
  <a href="/YE-Application/pages/ye-calendar.html" class="px-5 py-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 font-semibold text-sm transition-all text-slate-600 dark:text-slate-300">Calendar</a>
  <a href="/YE-Application/pages/Settings.html" class="px-4 py-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-all text-lg" title="Settings">⚙️</a>
</nav>

<main class="w-full max-w-7xl px-6 pt-32 flex flex-col gap-10">
  <header class="equinox-mesh p-8 md:p-12 text-white flex flex-col gap-10">
    <div class="absolute inset-0 bg-white/10 backdrop-blur-[2px]"></div>
    <div class="relative z-10 flex flex-col items-center justify-center text-center gap-8 w-full">
      <div class="w-full flex flex-col items-center">
        <h1 class="text-4xl md:text-6xl font-black tracking-tight mb-4 drop-shadow-md text-white">
          Hello, <span id="dashboard-user-name"></span>
        </h1>
        <div class="w-full max-w-lg mx-auto">
          <div id="intention-input-mode" class="flex flex-col sm:flex-row justify-center items-center gap-3">
            <input type="text" id="daily-intention-input" placeholder="Set intention..." class="w-full px-5 py-3 rounded-xl text-slate-900 bg-white/90 focus:bg-white outline-none focus:ring-4 ring-pink-400/50 shadow-lg font-medium transition-all" />
            <button id="save-intention-btn" class="w-full sm:w-auto bg-slate-900 text-white px-6 py-3 rounded-xl font-bold shadow-xl hover:shadow-2xl hover:-translate-y-1 transition-all">Lock In</button>
          </div>
          <div id="intention-display-mode" class="hidden inline-flex justify-center items-center gap-4 bg-black/20 backdrop-blur-md px-6 py-3 rounded-2xl border border-white/20">
            <span class="text-2xl animate-pulse">🎯</span>
            <p class="font-semibold text-lg drop-shadow-sm">"<span id="intention-text"></span>"</p>
            <button id="edit-intention-btn" class="text-xs bg-white/20 hover:bg-white/40 px-3 py-1 rounded-full font-bold transition-colors">Edit</button>
          </div>
        </div>
      </div>
    </div>
    <div class="relative z-10 grid grid-cols-2 lg:grid-cols-4 gap-4 w-full border-t border-white/20 pt-8">
      <div class="bg-black/20 backdrop-blur-md border border-white/20 p-5 rounded-2xl text-center shadow-xl">
        <p class="text-4xl font-black mb-1" id="stat-task-day">0</p>
        <p class="text-xs font-bold uppercase tracking-widest text-white/80">Tasks Done Today</p>
      </div>
      <div class="bg-black/20 backdrop-blur-md border border-white/20 p-5 rounded-2xl text-center shadow-xl">
        <p class="text-4xl font-black mb-1" id="stat-task-week">0</p>
        <p class="text-xs font-bold uppercase tracking-widest text-white/80">Tasks Done This Week</p>
      </div>
      <div class="bg-black/20 backdrop-blur-md border border-white/20 p-5 rounded-2xl text-center shadow-xl">
        <p class="text-4xl font-black mb-1" id="stat-task-month">0</p>
        <p class="text-xs font-bold uppercase tracking-widest text-white/80">Tasks Done This Month</p>
      </div>
      <div class="bg-black/20 backdrop-blur-md border border-white/20 p-5 rounded-2xl text-center shadow-xl">
        <p class="text-4xl font-black mb-1" id="stat-review">0</p>
        <p class="text-xs font-bold uppercase tracking-widest text-white/80">Notes to Review</p>
      </div>
    </div>
  </header>

  <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
    <div class="lg:col-span-7 flex flex-col gap-8">
      <section class="flare-card card-day overflow-hidden group">
        <div class="flex justify-between items-center mb-6 relative z-10">
          <h2 class="text-2xl font-bold">Action Core</h2>
          <div class="flex gap-2">
            <button type="button" id="task-complete" class="px-4 py-2 rounded-xl text-xs font-bold bg-amber-100 text-amber-700">Complete</button>
            <button type="button" id="remove-task-btn" class="px-4 py-2 rounded-xl text-xs font-bold bg-red-100 text-red-700">Delete</button>
          </div>
        </div>
        <form id="task-form" class="flex gap-3 mb-6 relative z-10">
          <input type="text" id="task-title" placeholder="New objective..." class="flare-input w-full px-5 py-3.5 pr-16" />
          <button type="submit" id="add-task-btn" class="absolute right-2 top-2 bottom-2 bg-amber-500 text-white px-4 rounded-xl font-bold">+</button>
        </form>
        <ul id="task-list" class="space-y-2 max-h-[300px] overflow-y-auto"></ul>
      </section>

      <section class="flare-card card-twilight overflow-hidden group">
        <div class="flex justify-between items-center mb-6 relative z-10">
          <h2 class="text-2xl font-bold">Timeline Alerts</h2>
          <button type="button" id="delete-reminders" class="px-4 py-2 rounded-xl text-xs font-bold bg-slate-100 text-slate-600">Clear Past Due</button>
        </div>
        <form id="reminder-form" class="flex flex-wrap gap-3 mb-6 relative z-10">
          <input type="text" id="reminder-title" placeholder="Event label..." class="flare-input flex-1 min-w-[200px] px-5 py-3.5" required />
          <input type="datetime-local" id="reminder-time" class="flare-input px-5 py-3.5 w-full sm:w-auto" required />
          <button type="submit" id="add-reminder-btn" class="bg-pink-500 text-white px-6 rounded-xl font-bold">Save</button>
        </form>
        <ul id="reminder-list" class="space-y-2 max-h-[200px] overflow-y-auto"></ul>
      </section>
    </div>

    <div class="lg:col-span-5 flex flex-col gap-8">
      <section class="flare-card card-night overflow-hidden group h-full">
        <div class="flex items-center gap-3 mb-6 relative z-10">
          <h2 class="text-2xl font-bold">Memory Matrix</h2>
        </div>
        <div id="noNoteMessage" class="text-center py-12 hidden relative z-10">
          <p class="text-slate-500 font-medium mb-4">Your knowledge vault is currently empty.</p>
          <a href="/pages/ye-notes.html" class="inline-block bg-indigo-50 text-indigo-600 font-bold px-6 py-3 rounded-full hover:bg-indigo-100 transition-colors">Write Notes &rarr;</a>
        </div>
        <div class="flex flex-col h-full relative z-10">
          <h3 id="recallTitle" class="text-lg font-bold mb-4"></h3>
          <button id="revealNoteBtn" class="w-full bg-indigo-500 text-white font-black py-4 rounded-xl shadow-lg">Reveal Knowledge</button>
          <div id="recallContainer" class="hidden flex-col gap-4">
            <div id="recallBody" class="p-5 bg-white/60 dark:bg-slate-900/60 rounded-xl text-sm whitespace-pre-wrap max-h-[350px] overflow-y-auto border"></div>
            <div class="grid grid-cols-2 gap-3">
              <button class="confidence-btn py-3 rounded-xl text-sm font-bold bg-white border-2 border-red-100 text-red-600" data-rating="low">Hard (1d)</button>
              <button class="confidence-btn py-3 rounded-xl text-sm font-bold bg-white border-2 border-amber-100 text-amber-600" data-rating="medium">Good (3d)</button>
              <button class="confidence-btn py-3 rounded-xl text-sm font-bold bg-white border-2 border-emerald-100 text-emerald-600" data-rating="high">Easy (7d)</button>
              <button class="confidence-btn py-3 rounded-xl text-sm font-bold bg-slate-100 text-slate-500" data-rating="not-required">Skip</button>
            </div>
          </div>
        </div>
      </section>
    </div>

    <div class="lg:col-span-12">
      <section class="flare-card card-calendar p-6 flex flex-col min-h-[500px] overflow-hidden group">
        <div class="flex items-center gap-3 mb-6 relative z-10">
          <h2 class="text-2xl font-bold">Timeline Command</h2>
        </div>
        <div id="app" class="w-full h-full flex-1 rounded-xl relative z-10"></div>
      </section>
    </div>
  </div>
</main>

<script type="module" src="/Scripts/Supabase/AuthGuard.ts"></script>
<script type="module" src="/Scripts/Tasks/AddTasks.ts"></script>
<script type="module" src="/Scripts/Tasks/DeleteTasks.ts"></script>
<script type="module" src="/Scripts/Reminders/AddReminder.ts"></script>
<script type="module" src="/Scripts/Reminders/DeleteReminder.ts"></script>
<script type="module" src="Scripts/Reminders/ReminderSettings.ts"></script>
<script type="module" src="Scripts/Calendar/MainCalendar.ts"></script>
<script type="module" src="Scripts/ActiveLearningTools/Dashboard/Stats.ts"></script>
<script type="module" src="Scripts/ActiveLearningTools/LearningTools/FlashCards.ts"></script>
</body>
</html>

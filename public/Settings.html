<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equinox - Settings</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .dark body {
      background-color: #0f172a;
      color: #e5e7eb;
    }
  </style>
</head>

<body class="bg-gray-50 font-sans text-gray-800">

<div class="flex min-h-screen">

  <!-- Sidebar -->
  <aside class="w-64 bg-white border-r p-6 flex flex-col">
    <h1 class="text-2xl font-bold text-blue-500 mb-8">Equinox</h1>

    <nav class="flex flex-col gap-2">
      <button data-tab="general" class="tab-btn bg-blue-50 text-blue-600 px-4 py-2 rounded-lg text-left font-medium">
        👤 General
      </button>
      <button data-tab="notifications" class="tab-btn px-4 py-2 rounded-lg text-left text-gray-600 hover:bg-gray-100">
        🔔 Notifications
      </button>
      <button data-tab="ai" class="tab-btn px-4 py-2 rounded-lg text-left text-gray-600 hover:bg-gray-100">
        ✨ AI Assistant
      </button>
      <button data-tab="privacy" class="tab-btn px-4 py-2 rounded-lg text-left text-gray-600 hover:bg-gray-100">
        🛡️ Privacy
      </button>
    </nav>

    <div class="mt-auto">
      <a href="/index.html" class="block text-center mt-6 px-4 py-2 border rounded-lg hover:bg-gray-100">
        ← Dashboard
      </a>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 p-8">

    <div class="max-w-3xl mx-auto space-y-6">

      <!-- Header -->
      <div>
        <h2 class="text-3xl font-bold">Settings</h2>
        <p class="text-gray-500">Manage your preferences</p>
      </div>

      <!-- General -->
      <section id="general" class="tab-section bg-white p-6 rounded-2xl shadow-sm border">

        <h3 class="text-xl font-semibold mb-4">General</h3>

        <!-- Theme -->
        <div class="flex items-center justify-between mb-6">
          <div>
            <p class="font-medium">Theme</p>
            <p class="text-sm text-gray-500">Switch between light and dark mode</p>
          </div>

          <button id="theme-toggle-btn" class="px-4 py-2 bg-gray-100 rounded-lg hover:bg-gray-200">
            Toggle
          </button>
        </div>

        <!-- Name -->
        <div>
          <label class="text-sm text-gray-600">Display Name</label>
          <div class="flex gap-2 mt-1">
            <input id="display-name" type="text" placeholder="Your name"
                   class="flex-1 px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"/>

            <button id="save-name-btn"
                    class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">
              Save
            </button>
          </div>
        </div>

      </section>

      <!-- Notifications -->
      <section id="notifications" class="tab-section hidden bg-white p-6 rounded-2xl shadow-sm border">
        <h3 class="text-xl font-semibold mb-4">Notifications</h3>
        <ul id="reminderSettings" class="space-y-3"></ul>
      </section>

      <!-- AI -->
      <section id="ai" class="tab-section hidden bg-white p-6 rounded-2xl shadow-sm border">
        <h3 class="text-xl font-semibold mb-4">AI Assistant</h3>

        <label class="text-sm text-gray-600">API Key</label>

        <div class="flex gap-2 mt-1">
          <input id="gemini-api-key" type="password"
                 class="flex-1 px-3 py-2 border rounded-lg"/>

          <button id="save-api-key-btn"
                  class="px-4 py-2 bg-blue-500 text-white rounded-lg">
            Save
          </button>
        </div>
      </section>

      <!-- Privacy -->
      <section id="privacy" class="tab-section hidden bg-white p-6 rounded-2xl shadow-sm border">
        <h3 class="text-xl font-semibold mb-4">Privacy</h3>

        <div class="space-y-4">

          <button id="import-btn"
                  class="w-full text-left p-4 border rounded-lg hover:bg-gray-50">
            Import Data
          </button>

          <button id="export-btn"
                  class="w-full text-left p-4 border rounded-lg hover:bg-gray-50">
            Export Data
          </button>

          <button id="purge-btn"
                  class="w-full text-left p-4 border rounded-lg bg-red-50 text-red-600 hover:bg-red-100">
            Delete All Data
          </button>

        </div>
      </section>

    </div>
  </main>
</div>

<!-- Modal -->
<dialog id="custom-confirm-modal" class="rounded-xl p-6 shadow-xl backdrop:bg-black/40">
  <h2 class="text-lg font-bold text-red-600 mb-2">Delete Everything?</h2>
  <p class="text-sm text-gray-600 mb-4">This cannot be undone.</p>

  <div class="flex justify-end gap-2">
    <button id="cancel-purge-btn" class="px-4 py-2 bg-gray-100 rounded-lg">
      Cancel
    </button>
    <button id="confirm-purge-btn" class="px-4 py-2 bg-red-600 text-white rounded-lg">
      Delete
    </button>
  </div>
</dialog>

<script>
  // Tabs
  const tabs = document.querySelectorAll('.tab-btn');
  const sections = document.querySelectorAll('.tab-section');

  tabs.forEach(btn => {
    btn.addEventListener('click', () => {
      tabs.forEach(b => b.classList.remove('bg-blue-50','text-blue-600'));
      btn.classList.add('bg-blue-50','text-blue-600');

      sections.forEach(sec => sec.classList.add('hidden'));
      document.getElementById(btn.dataset.tab).classList.remove('hidden');
    });
  });

  // Theme toggle (clean version)
  const toggle = document.getElementById('theme-toggle-btn');

  function setTheme(mode) {
    if (mode === 'dark') {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
    localStorage.setItem('theme', mode);
  }

  toggle.onclick = () => {
    const isDark = document.documentElement.classList.contains('dark');
    setTheme(isDark ? 'light' : 'dark');
  };

  // Load theme
  setTheme(localStorage.getItem('theme') || 'light');
</script>

<script type="module" src="../Scripts/Settings/SettingsPage.ts"></script>

</body>
</html>

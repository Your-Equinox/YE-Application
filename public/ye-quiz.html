<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YE - Practice Quiz</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans text-slate-800 h-screen flex flex-col">

<header class="bg-white border-b border-gray-200 p-4 flex justify-between items-center shadow-sm">
  <a href="/public/ye-notes.html" class="text-blue-600 hover:text-blue-800 font-medium transition">&larr; Back to Notes</a>
  <h1 id="quiz-title" class="text-xl font-bold text-gray-800">Loading Quiz...</h1>
  <div class="w-24"></div> </header>

<main class="flex-1 overflow-y-auto p-8 flex flex-col items-center">

  <div id="no-quiz-msg" class="hidden text-center text-gray-500 mt-20">
    <p class="text-xl mb-4">No quiz found for this note!</p>
    <a href="/public/ye-notes.html" class="text-blue-500 underline">Go back and generate one.</a>
  </div>

  <div id="quiz-container" class="w-full max-w-3xl space-y-6">
  </div>

  <div class="mt-12 mb-8">
    <button id="finish-quiz-btn" class="hidden px-8 py-3 bg-green-500 hover:bg-green-600 text-white font-bold rounded-full shadow-lg transition transform hover:scale-105">
      🎉 Finish Quiz
    </button>
  </div>

</main>

<script type="module" src="/Scripts/ActiveLearningTools/LearningTools/Quizzes.ts"></script>
</body>
</html>

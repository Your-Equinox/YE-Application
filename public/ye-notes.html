<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Equinox - Notes</title>

  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>

  <style>
    body {
      background-color: #f9fafb;
    }

    .dark-mode {
      background-color: #111827;
      color: white;
    }

    .editor-container {
      max-width: 800px;
      margin: auto;
    }

    .ProseMirror {
      outline: none;
      min-height: 500px;
    }

    .sidebar-scroll::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>

<body class="font-sans flex h-screen overflow-hidden">

<!-- Sidebar -->
<aside class="w-64 bg-white border-r flex flex-col">

  <div class="p-5 border-b flex justify-between items-center">
    <a href="../index.html" class="text-sm text-gray-500 hover:text-blue-500">← Dashboard</a>
    <button id="new-note-btn" class="text-xl font-bold text-blue-500 hover:scale-110 transition">+</button>
  </div>

  <div id="sidebar-note-list" class="flex-1 overflow-y-auto p-3 space-y-2 sidebar-scroll"></div>

  <div class="p-4 border-t">
    <button id="importDocument-btn" class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600">
      Import Notes
    </button>
  </div>

</aside>

<!-- Main -->
<main class="flex-1 flex flex-col relative">

  <!-- Top Bar -->
  <div class="flex justify-between items-center px-8 py-4 border-b bg-white sticky top-0 z-10">

    <div class="flex gap-3">
      <button id="toggle-flashcard-btn" class="bg-gray-100 px-3 py-1 rounded-lg text-sm hover:bg-gray-200">🧠 Flashcards</button>
      <button id="generate-quiz-btn" class="bg-blue-100 text-blue-600 px-3 py-1 rounded-lg text-sm hover:bg-blue-200">🤖 Quiz</button>
      <button id="ai-assist-btn" class="bg-purple-100 text-purple-600 px-3 py-1 rounded-lg text-sm hover:bg-purple-200">✨ AI</button>
    </div>

    <button id="delete-note-btn" class="text-red-500 text-sm hover:underline">Delete</button>

  </div>

  <!-- Empty State -->
  <div id="empty-state" class="absolute inset-0 flex items-center justify-center text-gray-400 text-lg">
    Select or create a note to begin
  </div>

  <!-- Editor -->
  <div id="editor-container" class="editor-container p-8 hidden flex-col w-full">

    <input
            type="text"
            id="note-title"
            placeholder="Untitled"
            class="text-4xl font-bold mb-6 outline-none bg-transparent"
    />

    <!-- Toolbar -->
    <div id="format-toolbar" class="flex gap-2 mb-6 bg-white border p-2 rounded-xl shadow-sm sticky top-20 z-10">

      <button onclick="editor.chain().focus().toggleHeading({ level: 1 }).run()" class="px-3 py-1 hover:bg-gray-100 rounded">H1</button>
      <button onclick="editor.chain().focus().toggleHeading({ level: 2 }).run()" class="px-3 py-1 hover:bg-gray-100 rounded">H2</button>

      <div class="w-px bg-gray-300 mx-2"></div>

      <button onclick="editor.chain().focus().toggleBold().run()" class="px-3 py-1 font-bold hover:bg-gray-100 rounded">B</button>
      <button onclick="editor.chain().focus().toggleItalic().run()" class="px-3 py-1 italic hover:bg-gray-100 rounded">I</button>

      <div class="w-px bg-gray-300 mx-2"></div>

      <button onclick="editor.chain().focus().toggleCodeBlock().run()" class="px-3 py-1 hover:bg-gray-100 rounded">Code</button>
      <button onclick="editor.chain().focus().insertTable({ rows: 2, cols: 2 }).run()" class="px-3 py-1 hover:bg-gray-100 rounded">Table</button>

    </div>

    <!-- Editor -->
    <div id="tiptap-editor" class="prose max-w-none"></div>

  </div>

</main>

<!-- AI Sidebar -->
<aside id="ai-sidebar" class="fixed top-0 right-0 w-80 h-full bg-white border-l shadow-lg transform translate-x-full transition-transform duration-300 flex flex-col">

  <div class="p-4 border-b flex justify-between">
    <h3 class="font-bold">AI Assistant</h3>
    <button id="close-ai-btn">✕</button>
  </div>

  <div id="ai-chat-history" class="flex-1 p-4 overflow-y-auto"></div>

  <div class="p-4 border-t">
    <form id="ai-form" class="flex gap-2">
      <input id="ai-input" class="flex-1 border rounded px-2 py-1" placeholder="Ask something..." />
      <button class="bg-blue-500 text-white px-3 rounded">Send</button>
    </form>
  </div>

</aside>

<script>
  function loadTheme() {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
      document.body.classList.add('dark-mode');
    }
  }
  loadTheme();
</script>

<script type="module" src="/Scripts/NoteTaking/NotePage.ts"></script>

</body>
</html>

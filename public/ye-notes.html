<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YE - Notes</title>
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
</head>
<body class="bg-white font-sans text-slate-800 h-screen flex overflow-hidden">

<aside class="w-64 bg-gray-50 border-r border-gray-200 flex flex-col h-full shrink-0">
  <div class="p-4 border-b border-gray-200 flex justify-between items-center">
    <a href="../index.html" class="text-sm font-medium text-gray-500 hover:text-blue-600 transition">&larr; Dashboard</a>
    <div class="flex items-center gap-1">
      <button id="new-category-btn" class="text-xl font-light text-gray-400 hover:text-blue-600 transition px-2" title="New Category">📁</button>
      <button id="new-note-btn" class="text-2xl font-light text-gray-400 hover:text-gray-800 transition px-2" title="New Note">+</button>
    </div>
  </div>

  <div id="sidebar-note-list" class="flex-1 overflow-y-auto p-3 space-y-1">
  </div>

  <div class="p-4 border-t border-gray-200 bg-gray-50">
    <button id="importDocument-btn" class="w-full flex items-center justify-center gap-2 px-4 py-2 bg-white border border-gray-300 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-100 transition shadow-sm" title="Import Document">
      <span>📥</span> Import Notes
    </button>
    <input type="file" id="import-file" accept=".pdf, .docx, .txt, .md" class="hidden" />
  </div>
</aside>

<main class="flex-1 flex flex-col bg-white overflow-y-auto relative">

  <div id="empty-state" class="absolute inset-0 flex items-center justify-center text-gray-400 text-lg pointer-events-none">
    Select a note or create a new one to begin.
  </div>

  <div id="editor-container" class="max-w-4xl w-full mx-auto p-8 md:p-12 hidden flex-col min-h-full">

    <div class="flex flex-wrap justify-between items-center gap-4 mb-8">
      <div class="flex flex-wrap gap-2 md:gap-3">
        <button id="toggle-preview-btn" class="flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-medium transition bg-gray-100 text-gray-500 hover:bg-gray-200">
          <span>👁️</span> Preview Mode
        </button>

        <button id="toggle-flashcard-btn" class="flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-medium transition bg-gray-100 text-gray-500 hover:bg-gray-200">
          <span>🧠</span> Enable Flashcard
        </button>

        <button id="ai-assist-btn" class="flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-medium transition bg-blue-100 text-blue-700 hover:bg-blue-200 hidden">
          <span>✨</span> Ask AI
        </button>

        <button id="generate-quiz-btn" class="flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-medium transition bg-blue-100 text-blue-700 hover:bg-blue-200">
          <span>🤖</span> Generate Quiz
        </button>
      </div>

      <button id="delete-note-btn" class="text-red-400 hover:text-red-600 text-sm font-medium transition whitespace-nowrap">Delete Note</button>
    </div>

    <input type="text" id="note-title" class="text-4xl md:text-5xl font-bold w-full outline-none mb-6 placeholder-gray-200 text-gray-800 bg-transparent" placeholder="Untitled">

    <div id="format-toolbar" class="flex flex-wrap items-center gap-1 mb-4 bg-gray-50 border border-gray-200 p-1.5 rounded-lg transition-opacity w-fit">
      <button id="format-h1" class="px-2.5 py-1 text-sm font-bold text-gray-700 hover:bg-white hover:shadow-sm hover:text-blue-600 rounded transition" title="Heading 1">H1</button>
      <button id="format-h2" class="px-2.5 py-1 text-sm font-semibold text-gray-700 hover:bg-white hover:shadow-sm hover:text-blue-600 rounded transition" title="Heading 2">H2</button>
      <div class="w-px h-5 bg-gray-300 mx-1"></div>
      <button id="format-bold" class="px-2.5 py-1 text-sm font-bold text-gray-700 hover:bg-white hover:shadow-sm hover:text-blue-600 rounded transition" title="Bold">B</button>
      <button id="format-italic" class="px-2.5 py-1 text-sm italic text-gray-700 hover:bg-white hover:shadow-sm hover:text-blue-600 rounded transition font-serif" title="Italic">I</button>
      <div class="w-px h-5 bg-gray-300 mx-1"></div>
      <button id="format-list" class="px-2.5 py-1 text-sm text-gray-700 hover:bg-white hover:shadow-sm hover:text-blue-600 rounded transition flex items-center gap-1" title="Bullet List">
        <span class="text-lg leading-none">•</span> List
      </button>
      <button id="format-code" class="px-2.5 py-1 text-sm font-mono text-gray-700 hover:bg-white hover:shadow-sm hover:text-blue-600 rounded transition" title="Inline Code">`</button>
      <div class="w-px h-5 bg-gray-300 mx-1"></div>

      <button id="format-image" class="px-2.5 py-1 text-sm font-medium text-gray-700 hover:bg-white hover:shadow-sm hover:text-blue-600 rounded transition" title="Insert Image Link">🖼️</button>
      <input type="file" id="image-upload-input" accept="image/*" class="hidden" />
    </div>

    <textarea id="note-body" class="w-full flex-1 outline-none resize-none text-lg leading-relaxed placeholder-gray-300 text-gray-700 bg-transparent min-h-[500px]" placeholder="Start typing..."></textarea>

    <div id="note-preview" class="w-full flex-1 text-lg leading-relaxed bg-transparent min-h-[500px] hidden prose prose-blue max-w-none pb-12"></div>

  </div>

</main>

<aside id="ai-sidebar" class="fixed top-0 right-0 w-80 md:w-96 h-full bg-white border-l border-gray-200 shadow-2xl transform translate-x-full transition-transform duration-300 flex flex-col z-50">
  <div class="p-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
    <h3 class="font-bold text-gray-800 flex items-center gap-2"><span>✨</span> AI Assistant</h3>
    <button id="close-ai-btn" class="text-gray-400 hover:text-gray-700 text-2xl leading-none transition">&times;</button>
  </div>
  <div id="ai-chat-history" class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50 flex flex-col">
    <div class="text-sm text-gray-500 text-center my-4">Ask a question about your current note!</div>
  </div>
  <div class="p-4 border-t border-gray-200 bg-white shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
    <form id="ai-form" class="flex gap-2">
      <input type="text" id="ai-input" placeholder="How can I help with this note?" class="flex-1 border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition" required>
      <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md text-sm font-medium transition disabled:bg-blue-400" id="ai-submit-btn">Send</button>
    </form>
  </div>
</aside>

<script type="module" src="/Scripts/NoteTaking/NotePage.ts"></script>
<script type="module" src="/Scripts/NoteTaking/Categories.ts"></script>

</body>
</html>
